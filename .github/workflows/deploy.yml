name: Deploy LLYC Intelligence Dashboard (CI/CD)

on:
  push:
    branches:
      - main

jobs:
  # 🔍 JOB 1: Detectar cambios en Frontend y Backend
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🗂️ Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  # 🚀 JOB 2: Desplegar Backend (solo si hay cambios en backend/)
  deploy-backend:
    name: 🚀 Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    environment: prod
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Auth to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Deploy Backend to GCP Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: llyc-intelligence-api
          region: us-central1
          source: backend
          env_vars: |
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          flags: --allow-unauthenticated

  # 🎨 JOB 3: Desplegar Frontend (solo si hay cambios en frontend/ Y espera secuencialmente al backend si este corre)
  # Habilitado en modo prueba/mock para validar los tres jobs secuencialmente sin requerir aún la clave de Firebase
  deploy-frontend:
    name: 🎨 Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    environment: prod
    needs: [detect-changes, deploy-backend]
    # Se ejecuta si hay cambios en el frontend Y (el backend se desplegó con éxito O fue omitido porque no tenía cambios)
    if: |
      always() &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build Frontend Production Assets
        working-directory: frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.GCP_PROJECT_ID }}.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: 📡 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
